server {
  listen 80;
  resolver ${NGINX_LOCAL_RESOLVERS} valid=10s ipv6=off;
  root /usr/share/nginx/html;
  location / { try_files $uri /index.html; }
  location /api/ {
    set $simulator_upstream simulator;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$simulator_upstream:8080;
  }
  location /hub {
    set $hub_upstream dashboard-reaction-svc.drasi-system.svc.cluster.local;
    proxy_pass http://$hub_upstream:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}