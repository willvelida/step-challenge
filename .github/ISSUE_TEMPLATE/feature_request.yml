name: Feature request
description: Suggest an idea, improvement, or new contest for StepUp
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please open this **before** raising a pull request,
        so we can agree on the approach first.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see, and roughly how might it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this touch?
      options:
        - Simulator
        - Clock
        - Notifier
        - Dashboard
        - Drasi (queries/reactions)
        - Infrastructure (Bicep/Radius)
        - CI/CD
        - Docs
        - Not sure
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, screenshots, or examples.
    validations:
      required: false
